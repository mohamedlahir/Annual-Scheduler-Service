version: '3.8'

services:

  consul:
    image: consul:1.15.4
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
    networks:
      - spring-cloud-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "0000"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - spring-cloud-network

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - spring-cloud-network

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
    depends_on:
      - consul
    restart: unless-stopped
    networks:
      - spring-cloud-network

  auth-service:
    build:
      context: "../../Spring Security/Authentication Service"
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/auth_db"
      SPRING_DATASOURCE_USERNAME: "postgres"
      SPRING_DATASOURCE_PASSWORD: "0000"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
      SERVER_PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spring-cloud-network

  user-service:
    build:
      context: "../../Spring Boot App/user"
      dockerfile: Dockerfile
    profiles: ["extended"]
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/user_profile_db"
      SPRING_DATASOURCE_USERNAME: "postgres"
      SPRING_DATASOURCE_PASSWORD: "0000"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
      SERVER_PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spring-cloud-network

  annual-scheduler-service:
    build:
      context: "../../Spring Boot App/annual.scheduler"
      dockerfile: Dockerfile
    profiles: ["extended"]
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/scheduling_db"
      SPRING_DATASOURCE_USERNAME: "postgres"
      SPRING_DATASOURCE_PASSWORD: "0000"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      CONSUL_HOST: "consul"
      CONSUL_PORT: "8500"
      SERVER_PORT: "8083"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spring-cloud-network

networks:
  spring-cloud-network:
    driver: bridge

