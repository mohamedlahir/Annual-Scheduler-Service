spring.application.name=annual-scheduler-service
# Activate the `dev` profile so `application-dev.yml` is used when available
spring.profiles.active=dev

# Fallback datasource properties in case YAML files are not present on the classpath
# These ensure Spring Boot can determine a JDBC URL and driver during startup.
spring.datasource.url=jdbc:postgresql://localhost:5432/scheduling_db
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=8084
spring.profile.active=dev
